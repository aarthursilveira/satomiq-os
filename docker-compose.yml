
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?Variável DB_NAME é obrigatória}
      POSTGRES_USER: ${DB_USER:?Variável DB_USER é obrigatória}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Variável DB_PASSWORD é obrigatória}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - satomiq-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://os.satomiq.com}
      PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --schema prisma/schema.prisma --accept-data-loss && npm run start:prod"
    networks:
      - satomiq-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api-os.satomiq.com}
        VITE_APP_NAME: ${VITE_APP_NAME:-SAtomiq-OS}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - satomiq-network

volumes:
  postgres_data_v2:
    driver: local

networks:
  satomiq-network:
    driver: bridge
